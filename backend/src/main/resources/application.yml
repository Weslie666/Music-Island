server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/music_island?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.musicisland.entity
  configuration:
    map-underscore-to-camel-case: true

# JWT config
jwt:
  secret: music-island-secret-key-2026-graduation-project
  expiration: 604800000  # 7 days

# File storage
music:
  upload:
    audio-path: ../music-data/audio/
    cover-path: ../music-data/covers/
